    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-capsules"></i>
      </div>
      <span class="logo-text">Medi<span class="accent">Search</span></span>
    </div>

    <!-- Links -->
    <ul class="nav-links">
      <li><a href="#" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a></li>
